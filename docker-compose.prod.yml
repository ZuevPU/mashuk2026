services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: mashuk
    volumes:
      - mashuk_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./mashuk-backend
    ports:
      - '8080:8080'
    env_file:
      - ./mashuk-backend/.env.production
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@db:5432/mashuk?sslmode=disable
    volumes:
      - mashuk_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  mashuk_pg:
  mashuk_uploads:
