*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,&#39;SF Pro Display&#39;,Arial,sans-serif;background:#E8E2D8;color:#1A1714}

/* Phone */
.phone{width:300px;background:#F5F0E8;border-radius:44px;padding:14px 12px 0;border:2px solid #C0BAB2;box-shadow:0 28px 70px rgba(0,0,0,.22),0 6px 16px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.15)}

.scr{max-height:560px;overflow-y:auto;scrollbar-width:none;display:flex;flex-direction:column;gap:7px;padding-bottom:6px}
.scr::-webkit-scrollbar{display:none}

/* Cards */
.card{background:#fff;border-radius:14px;padding:11px 13px;box-shadow:0 2px 10px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.05)}

/* HOME header */
.hdr{background:#1A1714;border-radius:18px;padding:13px 14px;box-shadow:0 6px 18px rgba(0,0,0,.25)}

.hdr-dir{font-size:10px;color:#FF5500;font-weight:600;margin-top:2px}
.hdr-d{font-size:10px;color:#888}
.hdr-dhl{font-size:10px;color:#FF5500;font-weight:700;margin-top:2px}
.hdr-fl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#FF5500;margin-top:9px}

.dots{display:flex;gap:4px;margin-top:8px}
.d{height:4px;border-radius:2px;flex:1}
.d.dn{background:#4A4540}.d.td{background:#FF5500}.d.ft{background:#2A2622}

/* Priority orange */
.prio{background:#FF5500;border-radius:16px;padding:13px 14px;position:relative;overflow:hidden;cursor:pointer;box-shadow:0 4px 16px rgba(255,85,0,.35)}
.prio::after{content:&#39;&#39;;position:absolute;top:-18px;right:-18px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.1)}
.prio-tag{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.8);margin-bottom:4px}
.prio-title{font-size:16px;font-weight:800;color:#fff;line-height:1.25}
.prio-sub{font-size:11px;color:rgba(255,255,255,.85);margin-top:3px}
.prio-btn{display:inline-block;background:#fff;color:#FF5500;font-size:11px;font-weight:700;border-radius:9px;padding:6px 14px;margin-top:10px}

/* Missed card */
.miss{background:#FFF0F0;border-radius:13px;padding:10px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;box-shadow:0 2px 10px rgba(229,62,62,.12),0 0 0 1.5px rgba(229,62,62,.25)}

.avail-bdg{display:inline-flex;align-items:center;gap:5px;background:#888;color:#fff;font-size:9px;font-weight:700;border-radius:6px;padding:3px 8px;margin-bottom:6px}

.cap-row{display:flex;gap:5px;margin-top:9px}
.cap{flex:1;background:#F5F0E8;border:1px solid #E0DAD0;border-radius:9px;padding:7px 4px;text-align:center;cursor:pointer}

.prog-subtabs{display:flex;background:#EAE4DA;border-radius:12px;padding:3px;gap:2px}

/* ═══ TASKS ════════════════════════════════════════════════════ */

.abs{flex:1;text-align:center}

.abs-v{font-size:13px;font-weight:800}
